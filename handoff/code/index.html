<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Jobline — Reference Implementation (6 themes)</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Nunito:wght@400;500;600;700;800&family=Caveat:wght@500;600;700&family=Inter:wght@400;500;600;700;800&family=Newsreader:opsz,wght@6..72,400;6..72,500;6..72,600&family=Lora:wght@400;500;600&family=EB+Garamond:wght@400;500;600;700&family=Source+Serif+Pro:wght@400;600;700&display=swap" rel="stylesheet" />
<style>
  html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; }
  body { font-family: 'Inter', system-ui, sans-serif; color: #1a1a1a; }
  * { box-sizing: border-box; }
  button { font: inherit; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="themes.js"></script>
<script type="text/babel" src="shared-data.jsx"></script>
<script type="text/babel" src="content-providers.jsx"></script>
<script type="text/babel" src="mascots.jsx"></script>
<script type="text/babel" src="dashboard.jsx"></script>
<script type="text/babel" src="onboarding.jsx"></script>

<script type="text/babel">
  // Reference app — what the user sees after picking a theme. Persists
  // prefs to localStorage so refresh keeps state. In production swap
  // localStorage for a server fetch / write.

  const STORAGE_KEY = 'jobline.prefs.v1';

  function loadPrefs() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) return { ...DEFAULT_PREFS, ...JSON.parse(raw) };
    } catch (e) {}
    return null;
  }
  function savePrefs(p) {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(p)); } catch (e) {}
  }

  function App() {
    const [prefs, setPrefs] = React.useState(loadPrefs());
    const isNew = !prefs;
    const theme = THEMES[(prefs || DEFAULT_PREFS).theme] || THEMES.paper;

    const complete = (p) => { savePrefs(p); setPrefs(p); };
    const update = (patch) => {
      const next = { ...prefs, ...patch };
      savePrefs(next); setPrefs(next);
    };

    if (isNew) {
      return <Onboarding initialPrefs={DEFAULT_PREFS} onComplete={complete} />;
    }

    return (
      <div style={{ position: "relative", height: "100vh", overflow: "auto", background: theme.tokens["--bg"] }}>
        <ThemeStrip theme={theme} prefs={prefs} onChange={update} onResetup={() => { localStorage.removeItem(STORAGE_KEY); setPrefs(null); }} />
        <Dashboard theme={theme} prefs={prefs} />
      </div>
    );
  }

  // Small in-product switcher — would live in the settings page in
  // production, not as a sticky bar. Included here so the reference
  // makes it easy to flip between themes.
  function ThemeStrip({ theme, prefs, onChange, onResetup }) {
    const ids = ['paper', 'garden', 'tide', 'quiet', 'mountain', 'dusk'];
    return (
      <div style={{
        position: "sticky", top: 0, zIndex: 30,
        background: "color-mix(in oklch, " + theme.tokens["--bg"] + " 75%, transparent)",
        backdropFilter: "blur(12px)",
        borderBottom: "1px solid " + theme.tokens["--line"],
        padding: "10px 24px",
        display: "flex", alignItems: "center", gap: 16, flexWrap: "wrap",
      }}>
        <div style={{ fontFamily: "'Fraunces', Georgia, serif", fontSize: 16, fontWeight: 600, color: theme.tokens["--ink"] }}>
          Jobline
        </div>
        <div style={{ flex: 1, display: "flex", gap: 6, overflow: "auto" }}>
          {ids.map(id => {
            const t = THEMES[id];
            const active = id === prefs.theme;
            return (
              <button key={id} onClick={() => onChange({ theme: id })}
                style={{
                  padding: "6px 12px", borderRadius: 999,
                  background: active ? theme.tokens["--ink"] : "transparent",
                  color: active ? theme.tokens["--bg"] : theme.tokens["--sub"],
                  border: `1px solid ${active ? theme.tokens["--ink"] : theme.tokens["--line"]}`,
                  fontSize: 12, fontWeight: 600, cursor: "pointer", whiteSpace: "nowrap",
                }}>{t.name}</button>
            );
          })}
        </div>
        {theme.mascot && (
          <label style={{ display: "flex", alignItems: "center", gap: 6, fontSize: 12, color: theme.tokens["--sub"], cursor: "pointer" }}>
            <input type="checkbox" checked={prefs.mascotEnabled}
              onChange={(e) => onChange({ mascotEnabled: e.target.checked })} />
            mascot
          </label>
        )}
        <button onClick={onResetup} style={{
          padding: "6px 12px", borderRadius: 999,
          background: "transparent", color: theme.tokens["--sub"],
          border: `1px dashed ${theme.tokens["--line"]}`,
          fontSize: 12, fontWeight: 600, cursor: "pointer",
        }}>↺ re-do setup</button>
      </div>
    );
  }

  const root = ReactDOM.createRoot(document.getElementById('root'));
  root.render(<App />);
</script>
</body>
</html>
